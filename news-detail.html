<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻详情-兔BUG</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1">

  <style>
    .news-detail {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .back-btn {
      display: inline-block;
      padding: 8px 16px;
      background: var(--card);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .back-btn:hover {
      opacity: 0.8;
    }
    .news-detail-cover {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .news-detail-title {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .news-detail-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .news-detail-meta a {
      color: var(--accent);
      text-decoration: none;
    }
    .news-detail-meta a:hover {
      text-decoration: underline;
    }
    .news-detail-content {
      font-size: 16px;
      line-height: 1.8;
    }
  </style>
</head>

<body class="page-fade">

<div class="container">
  <div class="news-detail">
    <div class="back-btn" onclick="location.href='news.html'">← 返回新闻</div>
    <img class="news-detail-cover" id="cover" src="">
    <div class="news-detail-title" id="title">加载中...</div>
    <div class="news-detail-meta" id="meta"></div> <!-- 这里会显示 -->
    <div class="news-detail-content" id="content"></div>
  </div>
</div>

<script src="assets/js/core.js"></script>
<script>
  const p = new URLSearchParams(location.search);
  const index = parseInt(p.get("index")) || 0;
  const newsList = JSON.parse(localStorage.getItem("newsList") || "[]");
  const item = newsList[index];

  document.getElementById("cover").src = item.cover;
  document.getElementById("title").innerText = item.title;
  document.getElementById("content").innerText = item.content;

  // 来源 + 时间
  const metaEl = document.getElementById("meta");
  if (item.newsVia) {
    metaEl.innerHTML = `<a href="${item.newsVia}" target="_blank">${item.source}</a> · ${item.time}`;
  } else {
    metaEl.innerText = `${item.source} · ${item.time}`;
  }
</script>
</body>
</html>
