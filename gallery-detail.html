<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片预览-兔BUG</title>
<link rel="stylesheet" href="assets/css/style.css?v=1">

<style>
/* 关键：让页面只负责展示图片，不撑开高度 */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* 禁止页面滚动！图片必须一屏显示 */
}

/* 全屏居中容器 */
.full-preview {
  width: 100vw;
  height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}

/* 返回按钮 */
.back-btn {
  position: fixed;
  top: 70px;
  left: 20px;
  padding: 6px 14px;
  border-radius: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover {
  background: var(--accent);
  color: #fff;
}

/* 🔥 核心：无论图片多大/多小，永远等比例 + 不超过屏幕70% */
.image-box {
  max-width: 70vw;
  max-height: 70vh;
  width: auto;
  height: auto;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* 等比例！完整显示！ */
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

/* 下方信息：需要滚动看 → 放在独立可滚动区域 */
.info-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 30vh;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  overflow-y: auto; /* 只有这里可以滚动 */
}
.info-title {
  font-size: 16px;
  margin-bottom: 8px;
}
.info-meta {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
</style>
</head>

<body class="page-fade">
  <div class="back-btn" onclick="history.back()">← 返回</div>

  <div class="full-preview">
    <div class="image-box">
      <img id="mainImg" alt="">
    </div>
  </div>

  <!-- 图片信息（可滚动） -->
  <div class="info-panel">
    <div class="info-title" id="imgTitle">加载中...</div>
    <div class="info-meta">
      尺寸：自适应<br>
      时间：2026-03-29<br>
      标签：相册展示｜测试图片｜4K兼容
    </div>
  </div>

  <script src="assets/js/core.js"></script>
  <script>
    const p = new URLSearchParams(location.search)
    const src = decodeURIComponent(p.get('src') || '')
    const title = p.get('title') || '图片'

    if (src) {
      document.getElementById('mainImg').src = src
      document.getElementById('imgTitle').innerText = title
    }
  </script>
</body>
</html>
