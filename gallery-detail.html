<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片预览-兔BUG</title>
<link rel="stylesheet" href="assets/css/style.css?v=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

.full-preview {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 70px 10px 32vh;
  box-sizing: border-box;
}

.back-btn {
  position: fixed;
  top: 70px;
  left: 20px;
  padding: 6px 14px;
  border-radius: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover {
  background: var(--accent);
  color: #fff;
}

.image-box {
  max-width: 70vw;
  max-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

.info-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 32vh;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  overflow-y: auto;
}
.info-title {
  font-size: 16px;
  margin-bottom: 8px;
}
.info-meta {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
</style>
</head>

<body class="page-fade">
  <div class="back-btn" onclick="history.back()">← 返回</div>

  <div class="full-preview">
    <div class="image-box">
      <img id="mainImg" alt="">
    </div>
  </div>

  <div class="info-panel">
    <div class="info-title" id="imgTitle">加载中...</div>
    <div class="info-meta">
      尺寸：<span id="imgSize">读取中...</span><br>
      时间：2026-03-30<br>
      标签：<span id="imgTag">加载中...</span>
    </div>
  </div>

  <script src="assets/js/core.js"></script>
  <script>
    const p = new URLSearchParams(location.search)
    const src = decodeURIComponent(p.get('src') || '')
    const title = p.get('title') || '图片'
    const tag = p.get('tag') || '暂无标签'
    
    // 把 测试,风景 → 测试|风景
    const showTag = tag.replace(/,/g, ' | ')

    const img = document.getElementById('mainImg')
    document.getElementById('imgTitle').innerText = title
    document.getElementById('imgTag').innerText = showTag

    img.onload = function() {
      const w = this.naturalWidth
      const h = this.naturalHeight
      document.getElementById('imgSize').innerText = w + ' × ' + h + ' 像素'
    }

    img.src = src
  </script>
</body>
</html>
