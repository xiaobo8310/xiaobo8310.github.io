<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片预览-兔BUG</title>
<link rel="stylesheet" href="assets/css/style.css?v=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

.full-preview {
  width: 100vw;
  height: calc(100vh - 60px - 120px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

@media (max-width: 640px) {
  .full-preview {
    height: calc(100vh - 60px - 160px);
    padding: 10px;
  }
}

.back-btn {
  position: fixed;
  top: 15px;
  left: 20px;
  padding: 8px 16px;
  border-radius: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover {
  background: var(--accent);
  color: #fff;
}

.image-box {
  width: 90%;
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.image-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 999;
  border: none;
  transition: 0.2s;
}
.nav-btn:hover {
  background: rgba(0,0,0,0.6);
}
.prev { left: 20px; }
.next { right: 20px; }

@media (max-width: 640px) {
  .nav-btn {
    width: 60px;
    height: 60px;
    font-size: 26px;
  }
  .prev { left: 10px; }
  .next { right: 10px; }
}

.info-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: auto;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  box-sizing: border-box;
  overflow: hidden;
  z-index: 10;
}

.info-title {
  font-size: 16px;
  margin-bottom: 6px;
}
.info-meta {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
</style>
</head>

<body class="page-fade">

<div class="back-btn" onclick="location.href='gallery.html'">←返回</div>

<button class="nav-btn prev" id="prevBtn">←</button>
<button class="nav-btn next" id="nextBtn">→</button>

<div class="full-preview">
  <div class="image-box">
    <img id="mainImg" alt="">
  </div>
</div>

<!-- 你要的整齐格式：尺寸、时间、标签、参数 -->
<div class="info-panel">
  <div class="info-title" id="imgTitle">加载中...</div>
  <div class="info-meta">
    尺寸：<span id="imgSize">读取中...</span><br>
    时间：<span id="imgTime">加载中...</span><br>
    标签：<span id="imgTag">加载中...</span><br>
    参数：<span id="imgPhoto">加载中...</span><br>
  </div>
</div>

<script src="assets/js/core.js"></script>
<script>
const p = new URLSearchParams(location.search)
const src = decodeURIComponent(p.get('src') || '')
const title = p.get('title') || '图片'
const tag = p.get('tag') || '暂无标签'
const index = parseInt(p.get('index')) || 0

const galleryList = JSON.parse(localStorage.getItem('galleryList') || '[]')
const currentItem = galleryList[index] || {}

const img = document.getElementById('mainImg')

// 自动填充所有信息
document.getElementById('imgTitle').innerText = currentItem.title || title
document.getElementById('imgTag').innerText = (currentItem.tag || tag).replace(/,/g, ' | ')
document.getElementById('imgTime').innerText = currentItem.time || '未知时间'

// 拍摄参数（NULL 显示为 暂无参数）
const photoText = currentItem.photograph === 'NULL' || !currentItem.photograph 
  ? '暂无拍摄参数' 
  : currentItem.photograph
document.getElementById('imgPhoto').innerText = photoText

// 图片尺寸
img.onload = function() {
  document.getElementById('imgSize').innerText = `${this.naturalWidth} × ${this.naturalHeight} 像素`
}
img.src = currentItem.cover || src

// 翻页
const prevBtn = document.getElementById('prevBtn')
const nextBtn = document.getElementById('nextBtn')

prevBtn.onclick = () => {
  if (index <= 0) return
  const item = galleryList[index - 1]
  location.href = `gallery-detail.html?src=${encodeURIComponent(item.cover)}&title=${item.title}&tag=${item.tag}&index=${index - 1}`
}

nextBtn.onclick = () => {
  if (index >= galleryList.length - 1) return
  const item = galleryList[index + 1]
  location.href = `gallery-detail.html?src=${encodeURIComponent(item.cover)}&title=${item.title}&tag=${item.tag}&index=${index + 1}`
}
</script>

</body>
</html>
