<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片预览-兔BUG</title>
<link rel="stylesheet" href="assets/css/style.css?v=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

/* 核心布局：精确避开导航栏和底部栏 */
.full-preview {
  width: 100vw;
  height: calc(100vh - 60px - 100px); /* 导航栏60px + 底部栏100px */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

/* 手机端适配 */
@media (max-width: 640px) {
  .full-preview {
    height: calc(100vh - 60px - 90px);
    padding: 10px;
  }
}

/* 返回相册按钮 */
.back-btn {
  position: fixed;
  top: 15px;
  left: 20px;
  padding: 8px 16px;
  border-radius: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover {
  background: var(--accent);
  color: #fff;
}

/* 图片容器：等比例最大显示 + 四周留白 */
.image-box {
  width: 90%;
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.image-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

/* 🔥 底部信息栏：无滚动条 + 紧凑高度 */
.info-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px; /* 电脑端高度 */
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  box-sizing: border-box;
  overflow: hidden; /* 🔥 去掉滚动条 */
  z-index: 10;
}

/* 手机端底部栏 */
@media (max-width: 640px) {
  .info-panel {
    height: 120px;
  }
  .info-meta {
    font-size: 12px;
  }
}

.info-title {
  font-size: 16px;
  margin-bottom: 4px;
}
.info-meta {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
</style>
</head>

<body class="page-fade">

<div class="back-btn" onclick="location.href='gallery.html'">← 返回相册</div>

<div class="full-preview">
  <div class="image-box">
    <img id="mainImg" alt="">
  </div>
</div>

<div class="info-panel">
  <div class="info-title" id="imgTitle">加载中...</div>
  <div class="info-meta">
    尺寸：<span id="imgSize">读取中...</span><br>
    时间：2026-03-30<br>
    标签：<span id="imgTag">加载中...</span>
  </div>
</div>

<script src="assets/js/core.js"></script>
<script>
const p = new URLSearchParams(location.search)
const src = decodeURIComponent(p.get('src') || '')
const title = p.get('title') || '图片'
const tag = p.get('tag') || '暂无标签'

const showTag = tag.replace(/,/g, ' | ')
const img = document.getElementById('mainImg')

document.getElementById('imgTitle').innerText = title
document.getElementById('imgTag').innerText = showTag

img.onload = function() {
  document.getElementById('imgSize').innerText = `${this.naturalWidth} × ${this.naturalHeight} 像素`
}

img.src = src
</script>

</body>
</html>
