<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兔BUG</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐰</text></svg>">
  <style>
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding-bottom: 100px;
    }

    .hero h1 {
      color: #FFFFFF !important;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(30px);
      animation: hero-fade-up 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .hero p {
      color: #FFFFFF !important;
      text-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(20px);
      animation: hero-fade-up 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
    }

    @keyframes hero-fade-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    html,
    body {
      overflow: hidden;
      height: 100%;
    }

    .forest {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>兔BUG的个人空间</h1>
    <p>记录思考、收藏影像、使用工具</p>
  </div>

  <img src="assets/static/forest1.webp" class="forest">

  <footer id="footerMusic" style="
    position: fixed;
    left: 0;
    right: 0;
    bottom: 50px;
    text-align: center;
    font-size: 13px;
    color: #E0E0E0 !important;
    opacity: 0.6;
    cursor: pointer;
  ">
    © 2026 · 西郊有密林 助君出重围
  </footer>

  <script src="assets/js/core.js"></script>
  <script>
    // 🎵 背景音乐控制
    const audio = new Audio('assets/static/bgm.mp3');
    audio.loop = true;
    const footer = document.getElementById('footerMusic');

    // 点击底部文字控制音乐播放/暂停
    document.getElementById('footerMusic').onclick = () => {
      if (audio.paused) {
        audio.play();
        footer.style.animation = "breath 5s ease-in-out infinite"; // 播放 → 开启动画
      } else {
        audio.pause();
        footer.style.animation = "none"; // 暂停 → 停止动画
        footer.style.opacity = "0.6";
      }
    };

    // 🔥 超温柔呼吸动画
    const style = document.createElement('style');
      style.innerHTML = `
@keyframes breath {
  0%,100% { opacity:0.2; }
  50% { opacity:0.85; }
}
`;
    document.head.appendChild(style);
  </script>
</body>

</html>
