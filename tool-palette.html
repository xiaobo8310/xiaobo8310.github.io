<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配色生成器-兔BUG</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
.tool-page {
  padding: 30px 0;
}
.back-tools {
  color: var(--accent);
  margin-bottom: 20px;
  display: inline-block;
}
.palette-header {
  text-align: center;
  margin-bottom: 24px;
}
.input-row {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}
.color-box {
  width: 44px;
  height: 44px;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.palette-input {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  min-width: 140px;
}
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 30px;
}
.tool-btn {
  padding: 10px 20px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
}
.palette-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.palette-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
}
.palette-card h4 {
  margin-bottom: 16px;
  font-size: 16px;
}
.palette-colors {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}
.color-swatch {
  flex: 1;
  height: 50px;
  border-radius: 4px;
}
.palette-actions {
  display: flex;
  gap: 10px;
}
.palette-actions button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
.btn-copy {
  background: var(--accent);
  color: #fff;
}
.btn-download {
  background: var(--border);
  color: var(--fg);
}
</style>
</head>
<body class="page-fade">
<div class="container tool-page">
  <a href="tools.html" class="back-tools">← 返回工具箱</a>

  <div class="palette-header">
    <h2>配色生成器</h2>
    <p>输入颜色，生成专业配色方案</p>
  </div>

  <div class="input-row">
    <div class="color-box" id="colorPreview"></div>
    <input type="text" class="palette-input" id="colorInput" value="#3498db" placeholder="#HEX">
    <button class="tool-btn" onclick="generatePalettes()">生成方案</button>
    <button class="tool-btn" style="background:#f39c12;" onclick="randomColor()">随机颜色</button>
  </div>

  <div class="palette-grid" id="paletteContainer"></div>
</div>

<script src="assets/js/core.js"></script>
<script>
// 颜色转换与方案生成
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgbToHex(r,g,b) {
  return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// 生成单色配色（同色相，调整亮度）
function monochromatic(hex) {
  const {r,g,b} = hexToRgb(hex);
  const colors = [];
  for(let i=0; i<5; i++){
    const factor = 0.3 + i*0.18;
    const nr = Math.min(255, Math.max(0, Math.round(r*factor)));
    const ng = Math.min(255, Math.max(0, Math.round(g*factor)));
    const nb = Math.min(255, Math.max(0, Math.round(b*factor)));
    colors.push(rgbToHex(nr,ng,nb));
  }
  return colors;
}

// 生成近似色（色相±30°）
function analogous(hex) {
  // 简化版：在原颜色基础上轻微偏移
  const {r,g,b} = hexToRgb(hex);
  const colors = [hex];
  // 偏绿
  colors.push(rgbToHex(Math.max(0,r-30), Math.min(255,g+20), b));
  colors.push(rgbToHex(Math.max(0,r-60), Math.min(255,g+40), b));
  // 偏蓝
  colors.push(rgbToHex(r, Math.max(0,g-20), Math.min(255,b+30)));
  colors.push(rgbToHex(r, Math.max(0,g-40), Math.min(255,b+60)));
  return colors;
}

// 生成互补色（色相+180°）
function complementary(hex) {
  const {r,g,b} = hexToRgb(hex);
  const compR = 255 - r;
  const compG = 255 - g;
  const compB = 255 - b;
  const compHex = rgbToHex(compR, compG, compB);
  return [hex, compHex, 
    rgbToHex(Math.round((r+compR)/2), Math.round((g+compG)/2), Math.round((b+compB)/2)),
    rgbToHex(Math.round(r*0.7 + compR*0.3), Math.round(g*0.7 + compG*0.3), Math.round(b*0.7 + compB*0.3)),
    rgbToHex(Math.round(r*0.3 + compR*0.7), Math.round(g*0.3 + compG*0.7), Math.round(b*0.3 + compB*0.7))
  ];
}

// 渲染配色方案
function renderPalettes(baseHex, palettes) {
  const container = document.getElementById('paletteContainer');
  container.innerHTML = "";
  const labels = ["单色配色", "近似色配色", "互补色配色"];
  palettes.forEach((colors, idx) => {
    const card = document.createElement('div');
    card.className = "palette-card";
    let colorHtml = colors.map(c => `<div class="color-swatch" style="background:${c}" title="${c}"></div>`).join('');
    card.innerHTML = `
      <h4>${labels[idx]}</h4>
      <div class="palette-colors">${colorHtml}</div>
      <div class="palette-actions">
        <button class="btn-copy" onclick="copyPalette('${colors.join(',')}')">复制配色</button>
        <button class="btn-download" onclick="alert('下载功能待实现')">下载配色</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// 主生成函数
function generatePalettes() {
  const input = document.getElementById('colorInput').value.trim();
  if(!/^#[0-9a-fA-F]{6}$/.test(input)){
    alert("请输入合法的 HEX 颜色，如 #3498db");
    return;
  }
  document.getElementById('colorPreview').style.background = input;
  const mono = monochromatic(input);
  const analo = analogous(input);
  const comp = complementary(input);
  renderPalettes(input, [mono, analo, comp]);
}

// 随机颜色
function randomColor() {
  const hex = "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  document.getElementById('colorInput').value = hex;
  document.getElementById('colorPreview').style.background = hex;
  generatePalettes();
}

// 复制配色
function copyPalette(colorsStr) {
  navigator.clipboard.writeText(colorsStr).then(()=>{
    alert("配色已复制到剪贴板");
  });
}

// 初始化
window.onload = () => {
  generatePalettes();
};
</script>
</body>
</html>
